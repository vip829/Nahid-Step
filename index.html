<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wingo Step Calculator</title>
    
    <!-- ফন্ট ইমপোর্ট (Orbitron & Hind Siliguri) -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Orbitron:wght@700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- আইকন -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #050a15; /* ডিপ নেভি ব্লু */
            font-family: 'Poppins', 'Hind Siliguri', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* হেডার ডিজাইন */
        .header {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 30px;
        }
        
        .header h3 {
            color: #ffd700; /* গোল্ডেন */
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header h1 {
            color: #ff9f43; /* অরেঞ্জ */
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 159, 67, 0.4);
            letter-spacing: 2px;
        }

        /* ইনপুট এরিয়া */
        .input-card {
            background: rgba(22, 27, 46, 0.8);
            border: 1px solid #2c3e50;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .custom-input {
            background-color: #0f1525;
            border: 1px solid #3a4b66;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            width: 100%;
            transition: 0.3s;
        }

        .custom-input:focus { border-color: #29b6f6; box-shadow: 0 0 10px rgba(41, 182, 246, 0.2); }
        .custom-input::placeholder { color: #8892b0; font-size: 14px; }

        /* বাটন */
        .calc-btn {
            background: linear-gradient(90deg, #29b6f6, #039be5);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(3, 155, 229, 0.4);
            font-family: 'Hind Siliguri', sans-serif;
            margin-top: 5px;
        }
        
        .calc-btn:active { transform: scale(0.98); }

        /* টেবিল ডিজাইন */
        .table-container {
            width: 100%;
            max-width: 360px;
            margin-top: 30px;
            border-radius: 12px;
            overflow: hidden;
            display: none; /* প্রথমে লুকানো থাকবে */
            border: 1px solid #1e2746;
            box-shadow: 0 0 25px rgba(41, 182, 246, 0.15);
            margin-bottom: 100px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            background: #111827;
        }

        thead {
            background: linear-gradient(90deg, #0288d1, #29b6f6);
        }

        th {
            padding: 15px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #1f2937;
            font-size: 18px;
            font-weight: 700;
        }

        /* কালার স্কিম */
        .step-num { color: #d500f9; font-family: 'Orbitron', sans-serif; } /* বেগুনি */
        .bet-amt { color: #fff; font-family: 'Poppins', sans-serif; } /* সাদা */

        tr:nth-child(even) { background-color: #161e31; }

        /* টেলিগ্রাম বাটন (নিচে ফিক্সড) */
        .telegram-float {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 360px;
            background: #0088cc;
            color: white;
            padding: 16px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 25px rgba(0, 136, 204, 0.5);
            z-index: 1000;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }
        
        .telegram-float:hover { background: #0099e6; }

    </style>
</head>
<body>

    <!-- হেডার -->
    <div class="header">
        <h3>WINGO STEP BY</h3>
        <h1>OWNER NAHID</h1>
    </div>

    <!-- ইনপুট ফর্ম -->
    <div class="input-card">
        <input type="number" id="capital" class="custom-input" placeholder="আপনার মোট টাকা লিখুন (যেমন: 500)">
        <input type="number" id="steps" class="custom-input" placeholder="কত স্টেপ খেলবেন? (যেমন: 7)">
        
        <button class="calc-btn" onclick="calculateSteps()">
            <i class="fas fa-calculator"></i> হিসাব করুন
        </button>
    </div>

    <!-- রেজাল্ট টেবিল -->
    <div class="table-container" id="result-box">
        <table>
            <thead>
                <tr>
                    <th>Step</th>
                    <th>Bet (৳)</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- জাভাস্ক্রিপ্ট দিয়ে ডাটা আসবে -->
            </tbody>
        </table>
    </div>

    <!-- টেলিগ্রাম বাটন -->
    <a href="https://t.me/+sElwj20WU09mZjI1" class="telegram-float">
        <i class="fab fa-telegram-plane" style="font-size:20px;"></i> জয়েন টেলিগ্রাম চ্যানেল
    </a>

    <script>
        function calculateSteps() {
            let capitalInput = document.getElementById('capital').value;
            let stepsInput = document.getElementById('steps').value;
            
            // খালি ঘর চেক করা
            if (capitalInput === "" || stepsInput === "") {
                alert("দয়া করে টাকার পরিমাণ এবং স্টেপ সংখ্যা লিখুন!");
                return;
            }

            let capital = parseFloat(capitalInput);
            let steps = parseInt(stepsInput);
            
            if (capital <= 0 || steps <= 0) {
                alert("সঠিক সংখ্যা প্রদান করুন!");
                return;
            }

            // টেবিল শো করা
            document.getElementById('result-box').style.display = 'block';
            let tbody = document.getElementById('table-body');
            tbody.innerHTML = "";

            // সঠিক ক্যালকুলেশন সূত্র (পয়সা সহ)
            // সূত্র: StartBet = Capital / (2^Steps - 1)
            let divisor = Math.pow(2, steps) - 1;
            let startBet = capital / divisor; 
            
            // বেট যদি ১ টাকার কম হয়, তবে ১ টাকা সেট হবে
            if(startBet < 1) startBet = 1;

            let currentBet = startBet;
            let totalBet = 0;

            for (let i = 1; i <= steps; i++) {
                // পয়সা দেখানোর জন্য toFixed(2) ব্যবহার করা হয়েছে
                let displayBet = currentBet % 1 === 0 ? currentBet : currentBet.toFixed(2);
                
                let row = `
                    <tr>
                        <td class="step-num">${i}</td>
                        <td class="bet-amt">${displayBet} ৳</td>
                    </tr>
                `;
                tbody.innerHTML += row;

                totalBet += currentBet;
                currentBet = currentBet * 2; // পরবর্তী স্টেপে দ্বিগুণ
            }
        }
    </script>

</body>
</html>
